<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taxon · 实体图谱 — 菌丝样张</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@300;400;500;700;800&family=Noto+Sans+SC:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
html,body{height:100%;overflow:hidden;margin:0}*{box-sizing:border-box}
:root{
  --soil:#13110e;--soil2:#1b1712;--panel:#211c16;--cream:#ece5d8;--dim:#8b8275;
  --bio:#5ff2c2;--bio2:#b6f24a;--amber:#e0935a;--thread:rgba(95,242,194,.28);
  --line:rgba(236,229,216,.09);
}
body{font-family:"Hanken Grotesk","Noto Sans SC",sans-serif;color:var(--cream);
  background:radial-gradient(140% 120% at 40% 50%,#1c2a22 0%,var(--soil2) 50%,var(--soil) 85%),var(--soil);
  display:flex;height:100vh;height:100dvh}
.mono{font-family:"Space Mono",monospace}.dim{color:var(--dim)}

/* sidebar (shared) */
.side{width:clamp(180px,15vw,212px);flex-shrink:0;border-right:1px solid var(--line);display:flex;flex-direction:column;padding:1.1rem .8rem;background:rgba(10,9,7,.4)}
.logo{display:flex;align-items:center;gap:.5rem;font-weight:800;font-size:1.15rem;letter-spacing:-.02em;padding:.2rem .4rem 1.1rem}
.logo .spore{width:.6em;height:.6em;border-radius:50%;background:var(--bio);box-shadow:0 0 14px var(--bio);animation:pulse 2.6s infinite}
@keyframes pulse{50%{transform:scale(1.35);box-shadow:0 0 22px var(--bio)}}
.navsec{font-family:"Space Mono",monospace;font-size:.56rem;letter-spacing:.24em;text-transform:uppercase;color:var(--dim);padding:.9rem .5rem .35rem}
.nav{display:flex;align-items:center;gap:.6rem;padding:.5rem .55rem;border-radius:9px;font-size:.83rem;color:var(--cream);opacity:.7;text-decoration:none}
.nav:hover{opacity:1;background:rgba(95,242,194,.05)}
.nav.on{opacity:1;background:linear-gradient(90deg,rgba(95,242,194,.14),transparent);color:#fff;position:relative}
.nav.on::before{content:"";position:absolute;left:-.8rem;top:18%;height:64%;width:3px;border-radius:3px;background:var(--bio);box-shadow:0 0 10px var(--bio)}
.nav .ico{width:15px;height:15px;opacity:.85}
.side .foot{margin-top:auto;font-size:.7rem;color:var(--dim);padding:.5rem;display:flex;align-items:center;gap:.45rem}
.side .foot .d{width:.5em;height:.5em;border-radius:50%;background:var(--bio2);box-shadow:0 0 8px var(--bio2)}

/* main */
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.hdr{display:flex;align-items:center;gap:1rem;padding:1rem 1.4rem;border-bottom:1px solid var(--line);flex-wrap:wrap}
.hdr h1{font-size:1.5rem;font-weight:800;letter-spacing:-.02em;margin:0}
.seg{display:flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;font-size:.75rem}
.seg span{padding:.35rem .8rem;color:var(--dim)}
.seg span.on{background:rgba(95,242,194,.14);color:#fff}
.sel{display:flex;align-items:center;gap:.5rem;font-size:.78rem;padding:.4rem .8rem;border:1px solid var(--line);border-radius:9px;color:var(--cream);background:rgba(236,229,216,.03)}
.sel b{color:var(--bio)}
.srch{flex:1;max-width:280px;display:flex;align-items:center;gap:.5rem;padding:.4rem .8rem;border:1px solid var(--line);border-radius:9px;color:var(--dim);font-size:.78rem}
.spacer{flex:1}

/* graph stage + right panel */
.body{flex:1;display:flex;min-height:0}
.stage{flex:1;position:relative;overflow:hidden}
.net{position:absolute;inset:0}
.net svg{width:100%;height:100%}
.hypha{stroke:var(--thread);fill:none;stroke-width:1.2;stroke-linecap:round;stroke-dasharray:700;stroke-dashoffset:700;animation:grow 2.6s cubic-bezier(.4,0,.2,1) forwards}
.hypha.hot{stroke:rgba(182,242,74,.5);stroke-width:1.6}
@keyframes grow{to{stroke-dashoffset:0}}
.node{position:absolute;transform:translate(-50%,-50%);text-align:center;opacity:0;animation:bloom .9s ease forwards}
@keyframes bloom{from{opacity:0;transform:translate(-50%,-50%) scale(.4)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
/* tag node = round glowing cap */
.tagN .cap{width:var(--s);height:var(--s);border-radius:50%;margin:0 auto;background:radial-gradient(circle at 38% 32%,#fff,var(--c) 60%);box-shadow:0 0 calc(var(--s)) var(--c);animation:glow var(--t) ease-in-out infinite alternate}
@keyframes glow{from{filter:brightness(.82)}to{filter:brightness(1.28)}}
/* entity node = small square (different shape = bipartite legibility) */
.entN .sq{width:var(--s);height:var(--s);margin:0 auto;border:1.5px solid var(--cream);background:var(--soil2);transform:rotate(45deg)}
.entN.focus .sq{border-color:var(--bio2);background:rgba(182,242,74,.12);box-shadow:0 0 16px rgba(182,242,74,.5)}
.node label{display:block;font-weight:500;font-size:var(--fs,.74rem);margin-top:.4em;text-shadow:0 1px 10px rgba(0,0,0,.85);white-space:nowrap}
.node .n{font-family:"Space Mono",monospace;font-size:.6em;color:var(--bio);opacity:.7}
.entN label{color:var(--dim);font-family:"Space Mono",monospace;font-size:.66rem}
.entN.focus label{color:var(--bio2)}

/* right detail panel */
.panel{width:clamp(220px,22vw,300px);flex-shrink:0;border-left:1px solid var(--line);background:rgba(10,9,7,.4);padding:1.2rem;display:flex;flex-direction:column;gap:1.1rem;overflow:hidden}
.panel .ttl{font-family:"Space Mono",monospace;font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;color:var(--dim)}
.focusName{font-size:1.05rem;font-weight:700;display:flex;align-items:center;gap:.5rem}
.focusName .sq{width:.7em;height:.7em;border:1.5px solid var(--bio2);background:rgba(182,242,74,.12);transform:rotate(45deg)}
.focusId{font-family:"Space Mono",monospace;font-size:.72rem;color:var(--dim);margin-top:.2rem}
.tags{display:flex;flex-wrap:wrap;gap:.4rem}
.chip{display:inline-flex;align-items:center;gap:.4em;font-size:.74rem;font-weight:500;padding:.25em .7em;border-radius:999px;background:rgba(95,242,194,.1);border:1px solid var(--thread);color:var(--cream)}
.chip::before{content:"";width:.45em;height:.45em;border-radius:50%;background:var(--c,var(--bio));box-shadow:0 0 7px var(--c,var(--bio))}
.metric{display:flex;justify-content:space-between;font-size:.78rem;padding:.45rem 0;border-bottom:1px solid var(--line)}
.metric b{color:var(--bio)}
.hint{font-size:.7rem;color:var(--dim);line-height:1.6;margin-top:auto;border-top:1px solid var(--line);padding-top:.8rem}
.hint kbd{font-family:"Space Mono",monospace;background:rgba(236,229,216,.08);padding:.05em .4em;border-radius:4px;font-size:.9em}
@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important}}
</style>
</head>
<body>
<aside class="side">
  <div class="logo"><span class="spore"></span>Taxon</div>
  <div class="navsec">管理</div>
  <a class="nav"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>仪表盘</a>
  <a class="nav"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7l9-4 9 4-9 4-9-4z"/><path d="M3 12l9 4 9-4"/></svg>分组</a>
  <a class="nav on"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l9 5v10l-9 5-9-5V7z"/></svg>实体</a>
  <a class="nav"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>实体检索</a>
  <a class="nav"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7H3V5h11"/></svg>审核队列</a>
  <a class="nav"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>标签治理</a>
  <div class="navsec">设置</div>
  <a class="nav"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v4M12 18v4M2 12h4M18 12h4"/></svg>系统设置</a>
  <div class="foot"><span class="d"></span>localhost:3300</div>
</aside>

<div class="main">
  <div class="hdr">
    <h1>实体图谱</h1>
    <div class="seg"><span>列表</span><span class="on">◐ 图谱</span></div>
    <span class="sel">类型 · <b>dish</b> ▾</span>
    <span class="srch">⌕ 聚焦某个实体或标签…</span>
    <span class="spacer"></span>
    <span class="sel mono" style="font-size:.7rem">节点 142 / 上限 200</span>
  </div>

  <div class="body">
    <div class="stage">
      <div class="net">
        <svg viewBox="0 0 1000 680" preserveAspectRatio="xMidYMid slice">
          <path class="hypha hot" style="animation-delay:.2s" d="M500,340 C440,300 410,250 360,240"/>
          <path class="hypha hot" style="animation-delay:.35s" d="M500,340 C580,300 620,250 670,250"/>
          <path class="hypha hot" style="animation-delay:.5s" d="M500,340 C500,430 470,470 480,540"/>
          <path class="hypha" style="animation-delay:.6s" d="M360,240 C300,200 270,180 230,210"/>
          <path class="hypha" style="animation-delay:.7s" d="M360,240 C340,160 310,150 280,120"/>
          <path class="hypha" style="animation-delay:.8s" d="M670,250 C740,210 770,200 800,170"/>
          <path class="hypha" style="animation-delay:.9s" d="M670,250 C720,320 760,330 800,360"/>
          <path class="hypha" style="animation-delay:1s" d="M480,540 C560,560 600,560 650,540"/>
          <path class="hypha" style="animation-delay:1.05s" d="M480,540 C400,560 360,560 320,580"/>
        </svg>
        <!-- focused entity at center -->
        <div class="node entN focus" style="left:50%;top:50%;animation-delay:.2s"><div class="sq" style="--s:clamp(16px,1.8vw,22px)"></div><label>perf_dish_78490</label></div>
        <!-- tag neighbors (round glowing) -->
        <div class="node tagN" style="left:36%;top:35%;animation-delay:.5s"><div class="cap" style="--s:clamp(20px,2.4vw,30px);--c:var(--bio);--t:2.6s"></div><label>川菜 <span class="n">·1.6k</span></label></div>
        <div class="node tagN" style="left:67%;top:37%;animation-delay:.6s"><div class="cap" style="--s:clamp(16px,2vw,24px);--c:var(--bio2);--t:3s"></div><label>麻辣鲜香</label></div>
        <div class="node tagN" style="left:48%;top:79%;animation-delay:.7s"><div class="cap" style="--s:clamp(14px,1.7vw,20px);--c:var(--amber);--t:3.3s"></div><label>下饭</label></div>
        <!-- second-ring entities (square, dim) sharing those tags -->
        <div class="node entN" style="left:23%;top:31%;animation-delay:.9s"><div class="sq" style="--s:clamp(10px,1.1vw,14px)"></div><label>dish_61…</label></div>
        <div class="node entN" style="left:28%;top:18%;animation-delay:.95s"><div class="sq" style="--s:clamp(10px,1.1vw,14px)"></div><label>dish_14…</label></div>
        <div class="node entN" style="left:80%;top:25%;animation-delay:1s"><div class="sq" style="--s:clamp(10px,1.1vw,14px)"></div><label>dish_28…</label></div>
        <div class="node entN" style="left:80%;top:53%;animation-delay:1.05s"><div class="sq" style="--s:clamp(10px,1.1vw,14px)"></div><label>dish_71…</label></div>
        <div class="node entN" style="left:65%;top:79%;animation-delay:1.1s"><div class="sq" style="--s:clamp(10px,1.1vw,14px)"></div><label>dish_15…</label></div>
        <div class="node entN" style="left:32%;top:85%;animation-delay:1.15s"><div class="sq" style="--s:clamp(10px,1.1vw,14px)"></div><label>dish_99…</label></div>
      </div>
    </div>

    <!-- right detail panel: focused node -->
    <div class="panel">
      <div>
        <div class="ttl">聚焦实体</div>
        <div class="focusName"><span class="sq"></span>perf_dish_78490</div>
        <div class="focusId">dish · 2026/5/27 23:30</div>
      </div>
      <div>
        <div class="ttl" style="margin-bottom:.5rem">活跃标签 · 5</div>
        <div class="tags">
          <span class="chip" style="--c:var(--bio)">川菜</span>
          <span class="chip" style="--c:var(--bio2)">麻辣鲜香</span>
          <span class="chip" style="--c:var(--amber)">下饭</span>
          <span class="chip" style="--c:var(--bio)">热菜</span>
          <span class="chip" style="--c:var(--bio2)">猪肉</span>
        </div>
      </div>
      <div>
        <div class="ttl" style="margin-bottom:.3rem">邻域</div>
        <div class="metric"><span>共享标签的实体</span><b>38</b></div>
        <div class="metric"><span>最相似</span><b>dish_62524</b></div>
        <div class="metric" style="border:none"><span>共现最强标签</span><b>下饭 ×27</b></div>
      </div>
      <div class="hint">点击任意节点展开其邻域 · 滚轮缩放 · <kbd>空格</kbd> 重置布局<br>方块 = 实体 · 光点 = 标签</div>
    </div>
  </div>
</div>
</body>
</html>
