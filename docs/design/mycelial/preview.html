<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taxon — 菌丝 / Mycelial</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- Hanken Grotesk: warm humanist sans; Noto Sans SC: CJK; mono accents -->
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,300;0,500;0,800;1,400&family=Noto+Sans+SC:wght@300;500;900&family=Space+Mono&display=swap" rel="stylesheet">
<style>
html,body{height:100%;overflow:hidden;margin:0}*{box-sizing:border-box}
:root{
  --soil:#13110e; --soil2:#1f1a14; --cream:#ece5d8;
  --bio:#5ff2c2;     /* bioluminescent teal */
  --bio2:#b6f24a;    /* lime spore */
  --amber:#e0935a;   /* warm earth */
  --thread:rgba(95,242,194,.34);
  --pad:clamp(1.25rem,3.5vw,3.5rem);
}
body{font-family:"Hanken Grotesk","Noto Sans SC",sans-serif;color:var(--cream);
  background:radial-gradient(130% 110% at 25% 90%, #1c2a22 0%, var(--soil2) 45%, var(--soil) 80%),var(--soil);
  position:relative;}
/* faint spore dust */
body::before{content:"";position:fixed;inset:0;pointer-events:none;
  background:radial-gradient(circle at 30% 70%, rgba(95,242,194,.07), transparent 18%),
            radial-gradient(circle at 75% 30%, rgba(182,242,74,.05), transparent 16%);}
.scene{position:relative;width:100vw;height:100vh;height:100dvh;overflow:hidden;padding:var(--pad);display:flex;flex-direction:column;justify-content:space-between}

/* === WORDMARK === */
.brand{z-index:5}
.brand h1{font-size:clamp(1.7rem,3.3vw,2.8rem);font-weight:800;letter-spacing:-.02em;margin:0;display:flex;align-items:center;gap:.5rem}
.brand h1 .spore{width:.5em;height:.5em;border-radius:50%;background:var(--bio);box-shadow:0 0 16px var(--bio);animation:pulse 2.4s ease-in-out infinite}
@keyframes pulse{50%{transform:scale(1.4);box-shadow:0 0 26px var(--bio)}}
.brand .sub{font-family:"Space Mono",monospace;font-size:clamp(.55rem,1vw,.72rem);letter-spacing:.28em;text-transform:uppercase;color:var(--bio);opacity:.8;margin-top:.4rem}

/* === MYCELIAL NETWORK (hero) === */
.net{position:absolute;inset:0;z-index:1}
.net svg{width:100%;height:100%}
.hypha{stroke:var(--thread);fill:none;stroke-width:1.4;stroke-linecap:round;stroke-dasharray:600;stroke-dashoffset:600;animation:grow 2.8s cubic-bezier(.4,0,.2,1) forwards}
@keyframes grow{to{stroke-dashoffset:0}}
.knot{position:absolute;transform:translate(-50%,-50%);text-align:center;opacity:0;animation:bloom 1s ease forwards}
@keyframes bloom{from{opacity:0;transform:translate(-50%,-50%) scale(.3)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
.cap{width:var(--s);height:var(--s);border-radius:50%;margin:0 auto;background:radial-gradient(circle at 38% 32%,#fff,var(--c) 60%);box-shadow:0 0 calc(var(--s)) var(--c);animation:glow var(--t) ease-in-out infinite alternate}
@keyframes glow{from{filter:brightness(.85)}to{filter:brightness(1.25)}}
.knot label{display:block;font-family:"Noto Sans SC",sans-serif;font-weight:500;font-size:var(--fs);margin-top:.35em;text-shadow:0 1px 10px rgba(0,0,0,.8);white-space:nowrap}
.knot .n{font-family:"Space Mono",monospace;font-size:.62em;color:var(--bio);opacity:.7}

/* === SPECIMEN STRIP === */
.strip{display:flex;gap:clamp(1rem,3vw,3rem);align-items:flex-end;z-index:5;flex-wrap:wrap}
.spec .lab{font-family:"Space Mono",monospace;font-size:clamp(.5rem,.9vw,.62rem);letter-spacing:.22em;text-transform:uppercase;color:rgba(236,229,216,.45)}
.spec .big{font-size:clamp(1.4rem,3vw,2.3rem);font-weight:800;letter-spacing:-.02em;line-height:1.05}
.spec .big .hl{color:var(--bio2)}
.sws{display:flex;gap:.5rem;margin-top:.5rem}
.sws span{width:clamp(26px,3vw,40px);height:clamp(26px,3vw,40px);border-radius:40% 60% 55% 45%/55% 45% 55% 45%;box-shadow:0 0 14px currentColor}
.chip{display:inline-flex;align-items:center;gap:.45em;font-family:"Noto Sans SC",sans-serif;font-weight:500;font-size:clamp(.7rem,1.2vw,.92rem);padding:.3em .9em;border-radius:999px;background:rgba(95,242,194,.1);border:1px solid var(--thread);color:var(--cream)}
.chip::before{content:"";width:.5em;height:.5em;border-radius:50%;background:var(--bio);box-shadow:0 0 8px var(--bio)}
.corner{position:absolute;bottom:var(--pad);right:var(--pad);text-align:right;z-index:5}
.corner .name{font-size:clamp(1.1rem,2.4vw,2rem);font-weight:800}
.corner .en{font-family:"Space Mono",monospace;font-size:clamp(.55rem,1vw,.7rem);letter-spacing:.3em;text-transform:uppercase;color:var(--bio);opacity:.8}
@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important}}
</style>
</head>
<body>
<div class="scene">
  <div class="net">
    <svg viewBox="0 0 1000 600" preserveAspectRatio="xMidYMid slice">
      <path class="hypha" style="animation-delay:.2s" d="M280,300 C400,260 420,200 520,200"/>
      <path class="hypha" style="animation-delay:.5s" d="M520,200 C640,210 680,280 720,300"/>
      <path class="hypha" style="animation-delay:.7s" d="M520,200 C500,300 460,320 460,400"/>
      <path class="hypha" style="animation-delay:.9s" d="M280,300 C300,400 340,420 380,460"/>
      <path class="hypha" style="animation-delay:1.05s" d="M720,300 C760,380 780,420 800,460"/>
      <path class="hypha" style="animation-delay:1.2s" d="M460,400 C540,420 580,440 620,470"/>
    </svg>
    <div class="knot" style="left:28%;top:50%;animation-delay:.3s"><div class="cap" style="--s:clamp(16px,2vw,24px);--c:var(--amber);--t:3s"></div><label>菜系 <span class="n">·3.4k</span></label></div>
    <div class="knot" style="left:52%;top:33%;animation-delay:.55s"><div class="cap" style="--s:clamp(22px,2.8vw,34px);--c:var(--bio);--t:2.5s"></div><label>川菜 <span class="n">·1.6k</span></label></div>
    <div class="knot" style="left:72%;top:50%;animation-delay:.8s"><div class="cap" style="--s:clamp(13px,1.6vw,19px);--c:var(--bio2);--t:3.4s"></div><label>麻辣鲜香</label></div>
    <div class="knot" style="left:46%;top:67%;animation-delay:1s"><div class="cap" style="--s:clamp(12px,1.4vw,17px);--c:var(--bio);--t:2.8s"></div><label>素食</label></div>
    <div class="knot" style="left:38%;top:77%;animation-delay:1.1s"><div class="cap" style="--s:clamp(10px,1.2vw,14px);--c:var(--amber);--t:3.1s"></div><label>海鲜</label></div>
    <div class="knot" style="left:80%;top:77%;animation-delay:1.25s"><div class="cap" style="--s:clamp(9px,1.1vw,13px);--c:var(--bio2);--t:2.6s"></div><label>下饭</label></div>
  </div>

  <div class="brand">
    <h1><span class="spore"></span>Taxon</h1>
    <div class="sub">// 标签是会生长的网络</div>
  </div>

  <div class="strip">
    <div class="spec"><div class="lab">Type — Hanken Grotesk / 思源黑体</div><div class="big">分类<span class="hl">在生长</span></div></div>
    <div class="spec"><div class="lab">Palette · 菌落</div><div class="sws"><span style="background:#5ff2c2;color:#5ff2c2"></span><span style="background:#b6f24a;color:#b6f24a"></span><span style="background:#e0935a;color:#e0935a"></span><span style="background:#1f1a14;color:#3a3128;box-shadow:none;border:1px solid #3a3128"></span></div></div>
    <div class="spec"><div class="lab" style="margin-bottom:.5rem">Tag</div><span class="chip">川菜</span></div>
  </div>

  <div class="corner">
    <div class="name">菌丝</div>
    <div class="en">Mycelial Network</div>
  </div>
</div>
</body>
</html>
