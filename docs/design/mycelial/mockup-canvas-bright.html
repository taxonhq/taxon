<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taxon · 画布优先 + 提亮暖调 — 菌丝 v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@300;400;500;700;800&family=Noto+Sans+SC:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
html,body{height:100%;overflow:hidden;margin:0}*{box-sizing:border-box}
:root{
  /* === 提亮暖调：底色从近黑 → 暖腐殖土，moss + amber 氛围可见 === */
  --soil:#221a12;--soil2:#2c2317;--cream:#f1e9da;--dim:#ab9e89;
  --bio:#6ff5c8;--bio2:#c4f85a;--amber:#eaa066;
  --thread:rgba(111,245,200,.34);--line:rgba(241,233,218,.12);
  --glass:rgba(28,22,15,.5);
}
body{font-family:"Hanken Grotesk","Noto Sans SC",sans-serif;color:var(--cream);position:relative;
  /* 暖调大气：moss 绿（左下）+ amber（右上）叠在提亮腐殖土上 */
  background:
    radial-gradient(120% 100% at 18% 92%, #2f4034 0%, transparent 52%),
    radial-gradient(110% 95% at 86% 12%, #3d2e1d 0%, transparent 48%),
    radial-gradient(140% 130% at 50% 50%, #2c2317 0%, #221a12 80%),#221a12;}
.mono{font-family:"Space Mono",monospace}

/* ===== 全屏画布：有机体即界面 ===== */
.canvas{position:fixed;inset:0;z-index:1}
.canvas svg{width:100%;height:100%}
.hypha{stroke:var(--thread);fill:none;stroke-width:1.4;stroke-linecap:round;stroke-dasharray:1100;stroke-dashoffset:1100;animation:grow 3.2s cubic-bezier(.4,0,.2,1) forwards}
@keyframes grow{to{stroke-dashoffset:0}}
.knot{position:absolute;transform:translate(-50%,-50%);text-align:center;opacity:0;animation:bloom 1s ease forwards}
@keyframes bloom{from{opacity:0;transform:translate(-50%,-50%) scale(.3)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
.cap{width:var(--s);height:var(--s);border-radius:50%;margin:0 auto;background:radial-gradient(circle at 38% 30%,#fff,var(--c) 58%);box-shadow:0 0 calc(var(--s)*1.3) var(--c);animation:glow var(--t) ease-in-out infinite alternate}
@keyframes glow{from{filter:brightness(.85)}to{filter:brightness(1.35)}}
.knot label{display:block;font-weight:500;font-size:var(--fs,.82rem);margin-top:.4em;text-shadow:0 1px 12px rgba(0,0,0,.7);white-space:nowrap}
.knot .n{font-family:"Space Mono",monospace;font-size:.62em;color:var(--bio);opacity:.8}

/* ===== 悬浮 chrome（全部漂浮、半透明、无实心栏） ===== */
/* 品牌 */
.brand{position:fixed;top:1.5rem;left:4.6rem;z-index:10;display:flex;align-items:center;gap:.5rem;font-weight:800;font-size:1.2rem;letter-spacing:-.02em}
.brand .spore{width:.6em;height:.6em;border-radius:50%;background:var(--bio);box-shadow:0 0 16px var(--bio);animation:pulse 2.6s infinite}
@keyframes pulse{50%{transform:scale(1.35);box-shadow:0 0 24px var(--bio)}}

/* 导航即菌丝：一串被菌丝线连起来的发光节点，无面板背景 */
.spine{position:fixed;left:1.4rem;top:50%;transform:translateY(-50%);z-index:10;display:flex;flex-direction:column;align-items:center;gap:1rem}
.spine::before{content:"";position:absolute;top:14px;bottom:14px;left:50%;width:1.5px;transform:translateX(-50%);background:linear-gradient(var(--thread),rgba(111,245,200,.06));z-index:-1}
/* 节点带图标：静止即可辨认（救可发现性），hover 滑出标签 */
.gnode{width:30px;height:30px;border-radius:50%;border:1.5px solid rgba(241,233,218,.26);background:var(--glass);backdrop-filter:blur(6px);position:relative;cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center}
.gnode svg{width:15px;height:15px;color:var(--dim);transition:.2s}
.gnode:hover{border-color:var(--bio)}
.gnode:hover svg{color:var(--bio)}
.gnode.on{border-color:var(--bio);background:radial-gradient(circle at 38% 30%,#fff,var(--bio) 62%);box-shadow:0 0 16px var(--bio)}
.gnode.on svg{color:#0a1a12}
/* 标签：激活常显，其余 hover 滑出玻璃浮标 */
.gnode::after{content:attr(data-l);position:absolute;left:2.5rem;top:50%;transform:translateY(-50%) translateX(-6px);font-size:.78rem;font-weight:600;white-space:nowrap;color:#fff;text-shadow:0 1px 10px rgba(0,0,0,.7);background:var(--glass);border:1px solid var(--thread);padding:.22em .6em;border-radius:8px;backdrop-filter:blur(8px);opacity:0;pointer-events:none;transition:.18s}
.gnode:hover::after{opacity:1;transform:translateY(-50%) translateX(0)}
.gnode.on::after{opacity:1;transform:translateY(-50%);background:none;border:none;backdrop-filter:none;padding:0;text-shadow:0 1px 10px rgba(0,0,0,.6)}

/* 状态簇（右上漂浮） */
.status{position:fixed;top:1.5rem;right:1.6rem;z-index:10;display:flex;align-items:center;gap:.7rem}
.pill{display:flex;align-items:center;gap:.45rem;font-size:.72rem;padding:.34rem .75rem;border-radius:999px;background:var(--glass);border:1px solid var(--thread);backdrop-filter:blur(8px)}
.pill .d{width:.42em;height:.42em;border-radius:50%;background:var(--bio);box-shadow:0 0 8px var(--bio);animation:pulse 2s infinite}
.clock{font-family:"Space Mono",monospace;font-size:.76rem;color:var(--dim)}
.ghost{font-size:.72rem;padding:.34rem .75rem;border-radius:999px;border:1px solid var(--line);background:var(--glass);backdrop-filter:blur(8px)}

/* HUD 数据读数（四角漂浮，非底栏） */
.hud{position:fixed;z-index:10}
.hud .k{font-family:"Space Mono",monospace;font-size:.56rem;letter-spacing:.2em;text-transform:uppercase;color:var(--dim)}
.hud .v{font-size:clamp(2rem,4vw,3.4rem);font-weight:800;letter-spacing:-.03em;line-height:1;margin-top:.12rem}
.hud .v small{font-size:.4em;font-weight:500;color:var(--dim);margin-left:.25em}
.hud .v.glow{color:#fff;text-shadow:0 0 30px rgba(111,245,200,.5)}
.hud .sub{font-family:"Space Mono",monospace;font-size:.6rem;color:var(--bio2);margin-top:.3rem}
.hud.tl{top:5.2rem;left:4.6rem}
.hud.bl{bottom:5.4rem;left:4.6rem}
.hud.br{bottom:5.4rem;right:1.6rem;text-align:right}

/* 聚焦实体浮卡（左下，玻璃） */
.focus{position:fixed;bottom:1.4rem;left:4.6rem;z-index:10;display:flex;align-items:center;gap:.8rem;padding:.6rem .9rem;border-radius:14px;background:var(--glass);border:1px solid var(--thread);backdrop-filter:blur(10px)}
.focus .sq{width:.85rem;height:.85rem;border:1.5px solid var(--bio2);background:rgba(196,248,90,.14);transform:rotate(45deg)}
.focus .nm{font-family:"Space Mono",monospace;font-size:.82rem;font-weight:700}
.focus .mt{font-size:.66rem;color:var(--dim)}
.focus .chips{display:flex;gap:.3rem;margin-left:.4rem}
.focus .c{font-size:.66rem;padding:.12em .55em;border-radius:999px;background:rgba(111,245,200,.12);border:1px solid var(--thread)}

/* 命令提示（右下） */
.cmd{position:fixed;bottom:1.5rem;right:1.6rem;z-index:10;font-size:.72rem;color:var(--dim);display:flex;align-items:center;gap:.5rem;padding:.4rem .8rem;border-radius:999px;background:var(--glass);border:1px solid var(--line);backdrop-filter:blur(8px)}
.cmd kbd{font-family:"Space Mono",monospace;background:rgba(241,233,218,.1);padding:.1em .45em;border-radius:5px;font-size:.92em}
@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important}}
</style>
</head>
<body>

</div>

<!-- 品牌 -->
<div class="brand"><span class="spore"></span>Taxon</div>

<!-- 导航即菌丝（发光节点串，带图标 + hover 标签） -->
<nav class="spine">

  <div class="gnode" data-l="系统设置"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v4M12 18v4M2 12h4M18 12h4"/></svg></div>
</nav>

<!-- 状态簇 -->

<!-- HUD 数据读数（漂浮，非栏） -->
