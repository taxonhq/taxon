<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taxon — 标本馆 / Herbarium</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- Fraunces: natural-history display serif; Spectral: body; Noto Serif SC: CJK; mono accents -->
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&family=Spectral:ital,wght@0,300;0,500;1,400&family=Noto+Serif+SC:wght@400;600;900&family=Courier+Prime&display=swap" rel="stylesheet">
<style>
html,body{height:100%;overflow:hidden;margin:0}*{box-sizing:border-box}
:root{
  --paper:#f2ebdc; --paper2:#e7ddc6; --ink:#2f2a20; --ink2:#6b6047;
  --sepia:#8a6d3b; --leaf:#4a6741; --rust:#9c4a2e;
  --rule:rgba(74,67,52,.35);
  --pad:clamp(1.25rem,3.5vw,3.5rem);
}
body{
  font-family:"Spectral","Noto Serif SC",serif;color:var(--ink);
  background:var(--paper);position:relative;
}
/* aged-paper texture: fibers + foxing via layered gradients */
body::before{content:"";position:fixed;inset:0;pointer-events:none;
  background:
    radial-gradient(circle at 18% 22%, rgba(138,109,59,.10), transparent 12%),
    radial-gradient(circle at 82% 68%, rgba(156,74,46,.07), transparent 14%),
    radial-gradient(circle at 60% 88%, rgba(138,109,59,.08), transparent 10%),
    repeating-linear-gradient(94deg, transparent 0 6px, rgba(74,67,52,.012) 6px 7px);
  mix-blend-mode:multiply;}
.scene{position:relative;width:100vw;height:100vh;height:100dvh;overflow:hidden;padding:var(--pad);display:flex;flex-direction:column}

/* === HEADER: specimen sheet masthead === */
.mast{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid var(--ink);padding-bottom:.7rem}
.mast h1{font-family:"Fraunces",serif;font-weight:600;font-size:clamp(1.8rem,3.6vw,3rem);margin:0;letter-spacing:-.01em}
.mast h1 em{font-style:italic;font-weight:400;color:var(--sepia)}
.mast .meta{text-align:right;font-family:"Courier Prime",monospace;font-size:clamp(.55rem,1vw,.7rem);letter-spacing:.12em;color:var(--ink2);line-height:1.6;text-transform:uppercase}
.subhead{font-family:"Courier Prime",monospace;font-size:clamp(.55rem,1vw,.72rem);letter-spacing:.34em;text-transform:uppercase;color:var(--ink2);margin:.6rem 0 0}

/* === BODY: classification plate === */
.plate{flex:1;display:grid;grid-template-columns:1.4fr 1fr;gap:clamp(1rem,3vw,3rem);align-items:center;min-height:0}
.specimen{position:relative;height:100%;min-height:0}
.specimen svg{position:absolute;inset:0;width:100%;height:100%}
.branch{stroke:var(--sepia);stroke-width:1.2;fill:none;opacity:0;stroke-dasharray:400;stroke-dashoffset:400;animation:ink 1.8s ease forwards}
@keyframes ink{to{opacity:.8;stroke-dashoffset:0}}
.sp{position:absolute;transform:translate(-50%,-50%);opacity:0;animation:fade 1s ease forwards}
@keyframes fade{to{opacity:1}}
.sp .pt{width:.5rem;height:.5rem;border:1.4px solid var(--ink);border-radius:50%;background:var(--paper);margin:0 auto}
.sp .pt.fill{background:var(--leaf);border-color:var(--leaf)}
.sp .pt.rust{background:var(--rust);border-color:var(--rust)}
.sp label{display:block;font-family:"Noto Serif SC",serif;font-weight:400;font-size:clamp(.7rem,1.3vw,1rem);margin-top:.25em;white-space:nowrap}
.sp .lat{display:block;font-family:"Fraunces",serif;font-style:italic;font-size:.7em;color:var(--ink2)}

/* right column: type + swatches + chip */
.col{display:flex;flex-direction:column;gap:clamp(.8rem,2vh,1.4rem);border-left:1px solid var(--rule);padding-left:clamp(1rem,2.5vw,2rem)}
.field .k{font-family:"Courier Prime",monospace;font-size:clamp(.5rem,.9vw,.62rem);letter-spacing:.22em;text-transform:uppercase;color:var(--ink2)}
.field .big{font-family:"Fraunces",serif;font-size:clamp(1.3rem,2.8vw,2.1rem);line-height:1.1}
.field .big em{font-style:italic;color:var(--sepia)}
.sws{display:flex;gap:.4rem}
.sws span{width:clamp(24px,3vw,38px);height:clamp(24px,3vw,38px);border:1px solid var(--ink);border-radius:2px}
.chip{display:inline-flex;align-items:center;gap:.4em;align-self:flex-start;font-family:"Noto Serif SC",serif;font-size:clamp(.7rem,1.2vw,.9rem);padding:.25em .8em;border:1px solid var(--ink);border-radius:2px;background:var(--paper2)}
.chip .no{font-family:"Courier Prime",monospace;font-size:.7em;color:var(--ink2)}

/* footer plate label */
.foot{display:flex;justify-content:space-between;align-items:baseline;border-top:1px solid var(--rule);padding-top:.6rem;margin-top:.6rem}
.foot .name{font-family:"Fraunces",serif;font-style:italic;font-size:clamp(1.1rem,2.4vw,1.9rem)}
.foot .en{font-family:"Courier Prime",monospace;font-size:clamp(.55rem,1vw,.7rem);letter-spacing:.3em;text-transform:uppercase;color:var(--ink2)}
@media(max-width:600px){.plate{grid-template-columns:1fr}.col{border:none;padding:0}}
@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important}}
</style>
</head>
<body>
<div class="scene">
  <div class="mast">
    <div>
      <h1>Taxon <em>taxonomia</em></h1>
      <div class="subhead">Plate I · 标签分类标本</div>
    </div>
    <div class="meta">No. 001 / cuisine<br>Coll. 2026 · 568 spec.<br>恒温归档</div>
  </div>

  <div class="plate">
    <!-- classification plate: taxonomy as botanical specimen tree -->
    <div class="specimen">
      <svg viewBox="0 0 500 460" preserveAspectRatio="xMidYMid meet">
        <path class="branch" style="animation-delay:.2s" d="M250,60 C250,140 150,150 130,250"/>
        <path class="branch" style="animation-delay:.5s" d="M250,60 C250,150 360,150 380,240"/>
        <path class="branch" style="animation-delay:.8s" d="M130,250 C120,320 90,330 80,390"/>
        <path class="branch" style="animation-delay:.95s" d="M130,250 C150,320 190,330 200,390"/>
        <path class="branch" style="animation-delay:1.1s" d="M380,240 C390,310 420,330 420,390"/>
      </svg>
      <div class="sp" style="left:50%;top:13%;animation-delay:.2s"><div class="pt"></div><label>菜系<span class="lat">cuisine</span></label></div>
      <div class="sp" style="left:26%;top:54%;animation-delay:.7s"><div class="pt fill"></div><label>川菜<span class="lat">sichuan</span></label></div>
      <div class="sp" style="left:76%;top:52%;animation-delay:.85s"><div class="pt fill"></div><label>粤菜<span class="lat">cantonese</span></label></div>
      <div class="sp" style="left:16%;top:85%;animation-delay:1.1s"><div class="pt rust"></div><label>麻辣<span class="lat">mala</span></label></div>
      <div class="sp" style="left:40%;top:85%;animation-delay:1.2s"><div class="pt"></div><label>水煮<span class="lat">poached</span></label></div>
      <div class="sp" style="left:84%;top:85%;animation-delay:1.3s"><div class="pt fill"></div><label>清蒸<span class="lat">steamed</span></label></div>
    </div>

    <div class="col">
      <div class="field"><div class="k">Typeface — Fraunces / 思源宋体</div><div class="big">分类是一门<em>博物学</em></div></div>
      <div class="field"><div class="k">Palette · 标本色</div><div class="sws"><span style="background:#f2ebdc"></span><span style="background:#8a6d3b"></span><span style="background:#4a6741"></span><span style="background:#9c4a2e"></span></div></div>
      <div class="field"><div class="k">Tag chip</div><span class="chip">川菜 <span class="no">№1.6k</span></span></div>
    </div>
  </div>

  <div class="foot">
    <div class="name">标本馆</div>
    <div class="en">Herbarium · Linnaean</div>
  </div>
</div>
</body>
</html>
