name: 🐛 Bug Report / 缺陷报告
description: Report something that isn't working as expected / 报告功能异常
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug! Please fill out the sections below.
        感谢反馈缺陷，请尽量填全以下信息。

  - type: dropdown
    id: package
    attributes:
      label: Affected package / 受影响的包
      options:
        - service (Hono + Prisma backend)
        - console (Next.js UI)
        - both / 两者
        - not sure / 不确定
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened? / 发生了什么
      description: A clear description of the bug. / 清晰描述这个缺陷。
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce / 复现步骤
      description: How can we reproduce it? Include API requests, console actions, etc. / 如何复现？可附 API 请求、控制台操作等。
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior / 期望行为
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior / 实际行为
      description: Include error messages, response bodies, screenshots if relevant. / 可附错误信息、响应体、截图。
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment / 运行环境
      description: e.g. Node version, OS, deployment (local / docker), Postgres version. / 如 Node 版本、操作系统、部署方式、Postgres 版本。
      placeholder: |
        - Node:
        - OS:
        - Deploy: local / docker
        - Postgres:
    validations:
      required: false
